name: Publish to public repo

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Commit message (leave empty for date-based)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: internal

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: ppravdin/patchcord
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public-repo

      - name: Clean public repo (keep .git)
        run: |
          cd public-repo
          git rm -rf . 2>/dev/null || true
          git clean -fdx -e .git

      - name: Copy curated files
        run: |
          cd internal

          # --- Python package ---
          cp -r patchcord/ ../public-repo/patchcord/

          # --- Plugin ---
          cp -r patchcord-plugin/ ../public-repo/patchcord-plugin/
          cp -r .claude-plugin/ ../public-repo/.claude-plugin/

          # --- Infrastructure ---
          cp Dockerfile ../public-repo/
          cp docker-compose.yml ../public-repo/
          cp .dockerignore ../public-repo/
          cp pyproject.toml ../public-repo/
          cp requirements.txt ../public-repo/
          cp LICENSE ../public-repo/
          cp setup.sh ../public-repo/

          # --- Config examples ---
          cp .env.server.example ../public-repo/
          cp .env.direct.example ../public-repo/

          # --- Schema ---
          cp -r migrations/ ../public-repo/migrations/

          # --- Documentation ---
          mkdir -p ../public-repo/docs
          cp docs/architecture.md ../public-repo/docs/
          cp docs/client-setup.md ../public-repo/docs/
          cp docs/deployment.md ../public-repo/docs/
          cp docs/oauth-web-clients.md ../public-repo/docs/
          cp docs/README.md ../public-repo/docs/ 2>/dev/null || true

          # --- Codex skill (auto-discovered from .agents/skills/) ---
          mkdir -p ../public-repo/.agents/skills/patchcord
          cp public/skills/patchcord/SKILL.md ../public-repo/.agents/skills/patchcord/

          # --- Uploadable skills (claude.ai web) ---
          mkdir -p ../public-repo/skills
          cp public/skills/patchcord-web.md ../public-repo/skills/

          # --- Dev config ---
          cp .gitignore ../public-repo/
          cp .pre-commit-config.yaml ../public-repo/ 2>/dev/null || true

          # --- Public overrides (README, SECURITY, etc.) ---
          cp public/README.md ../public-repo/README.md
          cp public/SECURITY.md ../public-repo/SECURITY.md
          cp public/CLAUDE.md ../public-repo/CLAUDE.md 2>/dev/null || true

      - name: Sanitize
        run: |
          cd public-repo

          # Remove __pycache__ directories
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

          # Remove plugin .env.example (tombstone for removed feature)
          rm -f patchcord-plugin/.env.example

          # Strip internal filesystem paths
          find docs/ -name '*.md' -exec sed -i 's|/home/p/code/patchcord-site/[^ ]*|patchcord-site repo|g' {} +

          # Sanitize architecture.md — replace internal machine names
          if [ -f docs/architecture.md ]; then
            sed -i 's/boca machine/machine-a/g' docs/architecture.md
            sed -i 's/thick machine/machine-b/g' docs/architecture.md
            sed -i 's/| agent: frontend/| agent: frontend/g' docs/architecture.md
            sed -i 's/| agent: ds/| agent: backend/g' docs/architecture.md
          fi

      - name: Commit and push
        run: |
          cd public-repo
          git config user.name "ppravdin"
          git config user.email "ppravdin@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          MSG="${{ github.event.inputs.message }}"
          [ -z "$MSG" ] && MSG="Update $(date -u +%Y-%m-%d)"
          git commit -m "$MSG"
          git push
